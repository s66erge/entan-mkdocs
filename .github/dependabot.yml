version: 2
updates:
  # Keep GitHub Actions pinned versions current (and SHA pins, if adopted).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies (uv reads pyproject.toml / uv.lock).
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Base image updates for the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
