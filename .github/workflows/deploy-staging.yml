name: Deploy staging

# master → staging, no-touch. Runs the full checks gate first, then deploys.
on:
  push:
    branches: [master]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  deploy:
    needs: checks
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      image_ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      image_tags: |
        ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        ghcr.io/${{ github.repository }}:staging
      compose_project: gong-staging
      host_dir: /opt/gong/staging
      smoke_url: ${{ vars.STAGING_URL }}/healthz
    secrets: inherit
