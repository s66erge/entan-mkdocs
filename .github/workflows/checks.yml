name: Checks

# Reusable quality gate: lint, tests, entangled tangle-clean, and image build.
# Called by ci.yml (every PR + push to master) and by the deploy pipelines so
# nothing ships without passing the same checks.
on:
  workflow_call:

permissions:
  contents: read

env:
  UV_VERSION: "0.10.4"

jobs:
  # Linting is its own job so it surfaces as a distinct required status check
  # on every PR (branch protection requires "lint").
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --locked
      - name: ruff check
        run: uv run ruff check --output-format=github .

  test:
    name: tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --locked
      - name: pytest
        run: uv run pytest -q

  # Literate-programming invariant: the generated code (libs/*, main.py,
  # Dockerfile, pyproject.toml) must match the entangled markdown sources.
  tangle-clean:
    name: entangled tangle-clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --locked
      - name: Tangle and assert no drift
        run: |
          uv run entangled tangle --force
          git diff --exit-code || {
            echo "::error::Generated code is out of sync with docs/**. Run 'uv run entangled tangle --force' and commit.";
            exit 1;
          }

  build:
    name: docker build + scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          load: true
          tags: gong:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: gong:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
