# ~/~ begin <<docs/setup-deploy/mkdocs.md#mkdocs.yml>>[init]

site_name: Gong system and apps for Vipassane centers
site_url: https://s66erge.github.io/entan-mkdocs
repo_url: https://github.com/s66erge/entan-mkdocs

plugins:
  - search
#  - entangled
  - mermaid2:
      arguments:
         securityLevel: 'loose' 

markdown_extensions:
  - toc:
      permalink: "#"
  - pymdownx.highlight:
      linenums: true 
      # use_pygments: true
      anchor_linenums: true
      line_spans: __span
      # pygments_lang_class: true
  #- pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

theme:
  name: material
  features:
    #- navigation.instant
    - navigation.top
    #- navigation.tab
    - navigation.path
    - content.code.copy
  palette:
    #Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
#  - stylesheets/extra.css
  - stylesheets/rrt.css
#  - stylesheets/fruity.css

#extra_javascript:
#    - https://unpkg.com/mermaid/dist/mermaid.min.js

watch:
  - docs

# ~/~ end
