# ~/~ begin <<docs/setup-deploy/mkdocs.md#mkdocs.yml>>[init]
site_name: Gong system and apps for Vipassane centers
site_url: https://s66erge.github.io/entan-mkdocs
repo_url: https://github.com/s66erge/entan-mkdocs

plugins:
  - search
  #- entangled
  - mermaid2:
      arguments:
         securityLevel: 'loose' 

#extra_javascript:
#    - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - toc:
      permalink: "#"
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
      pygments_style: rrt
      # solarized-dark monokai default github-dark rrt 
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
          #format: !!python/name:mermaid2.fence_mermaid

theme:
  #name: readthedocs
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - content.code.annotate
    - navigation.top
    - toc.integrate
  palette: 
    #Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

#extra_css:
#  - styles/vscode.css

watch:
  - docs
# ~/~ end
