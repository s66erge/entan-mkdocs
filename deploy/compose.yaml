# Server-side stack for ONE environment (staging or production).
# Deployed by CI: `docker compose -p <project> up -d --wait`.
# TLS/ingress is handled by the shared edge Caddy (deploy/edge), not here — so
# staging and prod stay independent (own project, volumes, db, minio, network).
# Interpolated vars come from the shell (IMAGE, PROJECT) and the sibling .env.

services:
  app:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Persistent center databases live under DATA_DIR; mount there so config
      # and storage stay aligned. Seed template DBs once — see ci-cd.md.
      - app_data:${DATA_DIR:-/app/data}
    networks:
      - default   # reach db + minio
      - edge      # reachable by the shared Caddy
    expose:
      - "8000"
    # ponytail: tune if the app needs more headroom.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    # The image ships its own HEALTHCHECK (/healthz); `up --wait` waits on it.

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      # PG18 stores data in a version subdir; mount the parent (see postgres:18 docs).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  minio:
    image: quay.io/minio/minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

networks:
  # Per-environment edge network so staging and prod share no network.
  # Created once at bootstrap (docker network create gong-<env>-edge).
  edge:
    external: true
    name: ${PROJECT:-gong}-edge

volumes:
  app_data:
  postgres_data:
  minio_data:
